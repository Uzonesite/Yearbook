<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uZone Yearbook — Book</title>
  <style>
    :root{
      --bg:#0b0b10;
      --panel:#12121a;
      --panel2:#171721;
      --line:#262836;
      --text:#f4f7fb;
      --muted:#a7afbf;
      --accent:#7c5cff;
      --accent2:#bb86fc;
      --page:#f7f3ea;
      --shadow:0 20px 60px rgba(0,0,0,.32);
      --radius:22px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(187,134,252,.13), transparent 28%),
        linear-gradient(180deg,#09090e,#11111a);
      color:var(--text);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 20px;
      background:rgba(10,10,16,.75);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      box-shadow:0 0 22px rgba(124,92,255,.55);
      flex:0 0 auto;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button,a.btn{
      border:none;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      border-radius:14px;
      font-weight:800;
      font-size:.95rem;
      transition:.18s ease;
    }

    button:hover,a.btn:hover{ transform:translateY(-1px); }

    .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
    }

    .ghost{
      background:#12131b;
      color:#fff;
      border:1px solid var(--line);
    }

    .wrap{
      width:min(1500px,100%);
      margin:0 auto;
      padding:24px 20px 60px;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:20px;
      margin-bottom:22px;
      flex-wrap:wrap;
    }

    .hero h1{
      margin:0;
      font-size:clamp(2rem,5vw,3.15rem);
      letter-spacing:-.04em;
    }

    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      max-width:64ch;
      line-height:1.6;
    }

    .book-shell{
      background:rgba(18,18,26,.86);
      border:1px solid rgba(255,255,255,.07);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:18px;
    }

    .book-controls{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .meta{
      color:var(--muted);
      font-weight:600;
    }

    .book-stage{
      display:grid;
      place-items:center;
    }

    .page-wrap{
      width:100%;
      overflow-x:auto;
      padding-bottom:8px;
    }

    .page{
      width:min(1280px,100%);
      min-width:980px;
      aspect-ratio:2/1;
      background:linear-gradient(180deg,#fdfaf3,#f5efe4);
      border-radius:26px;
      padding:18px;
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.05),
        0 30px 60px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(0,0,0,.05), transparent 24px),
        linear-gradient(180deg, rgba(255,255,255,.35), transparent 28%);
      opacity:.35;
    }

    .page-grid{
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      grid-template-rows:repeat(2, minmax(0,1fr));
      gap:0;
      background:#ddd3c5;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(0,0,0,.09);
    }

    .empty-cell{
      background:
        linear-gradient(180deg, rgba(255,255,255,.68), rgba(247,242,234,.92));
      border-right:1px solid rgba(0,0,0,.08);
      border-bottom:1px solid rgba(0,0,0,.08);
      min-width:0;
      min-height:0;
    }

    .empty-cell.edge-right{ border-right:none; }
    .empty-cell.edge-bottom{ border-bottom:none; }

    .spot{
      position:relative;
      overflow:hidden;
      background:#fff;
      cursor:pointer;
      min-width:0;
      min-height:0;
      border-right:1px solid rgba(0,0,0,.08);
      border-bottom:1px solid rgba(0,0,0,.08);
    }

    .spot.edge-right{ border-right:none; }
    .spot.edge-bottom{ border-bottom:none; }

    .spot:hover{
      z-index:2;
      box-shadow:inset 0 0 0 2px rgba(124,92,255,.35);
    }

    .spot-head{
      position:absolute;
      left:10px;
      top:10px;
      z-index:5;
      background:rgba(0,0,0,.52);
      color:#fff;
      padding:7px 10px;
      border-radius:999px;
      font-size:.82rem;
      font-weight:800;
      backdrop-filter:blur(8px);
      max-width:calc(100% - 20px);
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      pointer-events:none;
    }

    .spot-canvas{
      position:absolute;
      left:0;
      top:0;
      transform-origin:top left;
      background:#fff;
      overflow:hidden;
    }

    .item{
      position:absolute;
      transform-origin:center center;
      user-select:none;
      pointer-events:none;
    }

    .item.text{
      white-space:pre-wrap;
      overflow-wrap:break-word;
      line-height:1.15;
    }

    .signature{
      position:absolute;
      opacity:.92;
      pointer-events:none;
      filter:drop-shadow(0 2px 3px rgba(0,0,0,.12));
    }

    .page-num{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.02em;
    }

    .empty-book{
      padding:40px 24px;
      text-align:center;
      color:var(--muted);
    }

    .modal-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.58);
      backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:100;
    }

    .modal{
      width:min(1120px,100%);
      max-height:92vh;
      overflow:auto;
      background:#101119;
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .modal-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:14px;
    }

    .preview{
      width:100%;
      aspect-ratio:2/1;
      max-height:70vh;
      background:#fff;
      border-radius:20px;
      position:relative;
      overflow:hidden;
    }

    .preview .fit{
      position:absolute;
      inset:0;
      transform-origin:top left;
    }

    .sign-card{
      margin-top:14px;
      background:#151621;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
    }

    .sign-tools{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      margin-top:14px;
      align-items:center;
    }

    input{
      width:100%;
      padding:12px 13px;
      border-radius:12px;
      background:#0d0f16;
      color:#fff;
      border:1px solid var(--line);
      outline:none;
    }

    canvas.signature-pad{
      width:100%;
      height:220px;
      background:#fff;
      border-radius:16px;
      touch-action:none;
      display:block;
    }

    .hint{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.55;
      margin-top:8px;
    }

    @media (max-width: 700px){
      .sign-tools{
        grid-template-columns:1fr;
      }

      .page{
        min-width:900px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> uZone Yearbook</div>
    <div class="actions">
      <a class="btn ghost" href="index.html">Login / Sign Up</a>
      <a class="btn primary" href="mypage.html">My Spot</a>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Published Yearbook</h1>
        <p>
          A real collage layout: 4 across, 2 down, with everyone packed seamlessly together on the page.
        </p>
      </div>
    </div>

    <div class="book-shell">
      <div class="book-controls">
        <div class="meta" id="bookMeta">Loading published pages...</div>
        <div class="actions">
          <button class="ghost" id="prevBtn">Previous</button>
          <button class="ghost" id="nextBtn">Next</button>
        </div>
      </div>

      <div id="bookContainer" class="book-stage"></div>
    </div>
  </div>

  <div class="modal-bg" id="spotModalBg">
    <div class="modal">
      <div class="modal-top">
        <div>
          <h2 id="modalTitle" style="margin:0 0 4px;font-size:1.35rem;"></h2>
          <div id="modalSub" style="color:var(--muted);font-weight:600;"></div>
        </div>
        <button class="ghost" id="closeModalBtn">Close</button>
      </div>

      <div class="preview" id="spotPreview">
        <div class="fit" id="spotPreviewFit"></div>
      </div>

      <div class="sign-card">
        <h3 style="margin:0 0 8px;">Sign this spot</h3>
        <div class="hint">Draw a signature, then save it onto this student’s page.</div>

        <div style="margin:12px 0 10px;">
          <input id="signerNameInput" placeholder="Your name (optional if logged in)" />
        </div>

        <canvas id="signaturePad" class="signature-pad"></canvas>

        <div class="sign-tools">
          <button class="ghost" id="clearSignatureBtn">Clear</button>
          <button class="ghost" id="cancelSignBtn">Cancel</button>
          <button class="primary" id="saveSignatureBtn">Save Signature</button>
        </div>

        <div id="signStatus" class="hint"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-analytics.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import {
      getFirestore,
      collection,
      query,
      where,
      getDocs,
      doc,
      getDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_k18vbiBsLhQB7PzgEVT9PEI_30Mu0kg",
      authDomain: "uzone-6148d.firebaseapp.com",
      databaseURL: "https://uzone-6148d-default-rtdb.firebaseio.com",
      projectId: "uzone-6148d",
      storageBucket: "uzone-6148d.firebasestorage.app",
      messagingSenderId: "88783701381",
      appId: "1:88783701381:web:4f6c4b1ad8b26d6fa6f0ec",
      measurementId: "G-HKL5246YMC"
    };

    const app = initializeApp(firebaseConfig);
    getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const PAGE_COLS = 4;
    const PAGE_ROWS = 2;

    const TYPE_LAYOUT = {
      0: {
        label: "Type 0 • 1/8 page",
        slotCols: 1,
        slotRows: 1,
        canvasWidth: 1000,
        canvasHeight: 1000
      },
      1: {
        label: "Type 1 • 1/4 page",
        slotCols: 2,
        slotRows: 1,
        canvasWidth: 2000,
        canvasHeight: 1000
      },
      2: {
        label: "Type 2 • 1/2 page",
        slotCols: 2,
        slotRows: 2,
        canvasWidth: 2000,
        canvasHeight: 2000
      },
      3: {
        label: "Type 3 • Full page",
        slotCols: 4,
        slotRows: 2,
        canvasWidth: 4000,
        canvasHeight: 2000
      }
    };

    const bookContainer = document.getElementById("bookContainer");
    const bookMeta = document.getElementById("bookMeta");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const spotModalBg = document.getElementById("spotModalBg");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    const spotPreview = document.getElementById("spotPreview");
    const spotPreviewFit = document.getElementById("spotPreviewFit");
    const signerNameInput = document.getElementById("signerNameInput");
    const signaturePad = document.getElementById("signaturePad");
    const clearSignatureBtn = document.getElementById("clearSignatureBtn");
    const cancelSignBtn = document.getElementById("cancelSignBtn");
    const saveSignatureBtn = document.getElementById("saveSignatureBtn");
    const signStatus = document.getElementById("signStatus");

    let currentUser = null;
    let publishedSpots = [];
    let packedPages = [];
    let currentPageIndex = 0;
    let activeSpot = null;

    onAuthStateChanged(auth, (user) => {
      currentUser = user || null;
      signerNameInput.value = user?.displayName || "";
    });

    function escapeHtml(str = "") {
      return String(str).replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#39;"
      }[m]));
    }

    function getTypeMeta(type) {
      return TYPE_LAYOUT[type] || TYPE_LAYOUT[0];
    }

    function getCanvasSize(type) {
      const meta = getTypeMeta(type);
      return { width: meta.canvasWidth, height: meta.canvasHeight };
    }

    function createEmptyPage() {
      return Array.from({ length: PAGE_ROWS }, () =>
        Array.from({ length: PAGE_COLS }, () => null)
      );
    }

    function canFit(page, row, col, cols, rows) {
      if (col + cols > PAGE_COLS || row + rows > PAGE_ROWS) return false;
      for (let r = row; r < row + rows; r++) {
        for (let c = col; c < col + cols; c++) {
          if (page[r][c] !== null) return false;
        }
      }
      return true;
    }

    function firstFit(page, cols, rows) {
      for (let r = 0; r <= PAGE_ROWS - rows; r++) {
        for (let c = 0; c <= PAGE_COLS - cols; c++) {
          if (canFit(page, r, c, cols, rows)) {
            return { row: r, col: c };
          }
        }
      }
      return null;
    }

    function placeSpot(page, spot, row, col, cols, rows) {
      for (let r = row; r < row + rows; r++) {
        for (let c = col; c < col + cols; c++) {
          page[r][c] = {
            kind: "covered",
            start: false,
            spotUid: spot.uid
          };
        }
      }

      page[row][col] = {
        kind: "spot",
        start: true,
        row,
        col,
        cols,
        rows,
        spot
      };
    }

    function packSpots(spots) {
      const pages = [];
      let current = createEmptyPage();

      for (const spot of spots) {
        const meta = getTypeMeta(spot.type);
        let pos = firstFit(current, meta.slotCols, meta.slotRows);

        if (!pos) {
          pages.push(current);
          current = createEmptyPage();
          pos = firstFit(current, meta.slotCols, meta.slotRows);
        }

        if (!pos) continue;
        placeSpot(current, spot, pos.row, pos.col, meta.slotCols, meta.slotRows);
      }

      const hasAnything = current.some(row => row.some(cell => cell !== null));
      if (hasAnything || pages.length === 0) {
        pages.push(current);
      }

      return pages;
    }

    function renderItem(item) {
      const z = Number.isFinite(item.z) ? item.z : 1;

      if (item.kind === "text") {
        return `
          <div class="item text"
            style="
              left:${item.x || 0}px;
              top:${item.y || 0}px;
              width:${item.w || 0}px;
              height:${item.h || 0}px;
              transform:rotate(${item.rotation || 0}deg);
              font-size:${item.fontSize || 36}px;
              color:${item.color || "#111111"};
              font-weight:${item.fontWeight || 700};
              font-family:${item.fontFamily || "Inter, Arial, sans-serif"};
              text-align:${item.align || "left"};
              z-index:${z};
            "
          >${escapeHtml(item.text || "")}</div>
        `;
      }

      if (item.kind === "image") {
        return `
          <img class="item"
            src="${item.src}"
            style="
              left:${item.x || 0}px;
              top:${item.y || 0}px;
              width:${item.w || 0}px;
              height:${item.h || 0}px;
              transform:rotate(${item.rotation || 0}deg);
              object-fit:contain;
              z-index:${z};
            "
            alt=""
          />
        `;
      }

      return "";
    }

    function renderSignature(sig) {
      return `
        <img class="signature"
          src="${sig.dataUrl}"
          style="
            left:${sig.x || 0}px;
            top:${sig.y || 0}px;
            width:${sig.w || 0}px;
            height:${sig.h || 0}px;
            transform:rotate(${sig.rotation || 0}deg);
          "
          alt=""
        />
      `;
    }

    function buildSpotInner(spot) {
      const size = getCanvasSize(spot.type || 0);
      const bg = spot.background || "#ffffff";
      const elements = (spot.elements || []).map(renderItem).join("");
      const signatures = (spot.signatures || []).map(renderSignature).join("");

      return `
        <div
          class="spot-canvas"
          style="
            background:${bg};
            width:${size.width}px;
            height:${size.height}px;
          "
        >
          ${elements}
          ${signatures}
        </div>
      `;
    }

    function fitInnerToWrapper(wrapperEl, innerEl) {
      if (!wrapperEl || !innerEl) return;
      const availableW = wrapperEl.clientWidth;
      const availableH = wrapperEl.clientHeight;
      const innerW = innerEl.offsetWidth;
      const innerH = innerEl.offsetHeight;
      if (!availableW || !availableH || !innerW || !innerH) return;

      const scale = Math.min(availableW / innerW, availableH / innerH);
      innerEl.style.transform = `scale(${scale})`;
    }

    function renderEmptyCells(page) {
      let html = "";

      for (let r = 0; r < PAGE_ROWS; r++) {
        for (let c = 0; c < PAGE_COLS; c++) {
          const cell = page[r][c];
          if (cell !== null) continue;

          const edgeRight = c === PAGE_COLS - 1 ? "edge-right" : "";
          const edgeBottom = r === PAGE_ROWS - 1 ? "edge-bottom" : "";

          html += `
            <div
              class="empty-cell ${edgeRight} ${edgeBottom}"
              style="grid-column:${c + 1}; grid-row:${r + 1};"
            ></div>
          `;
        }
      }

      return html;
    }

    function renderSpots(page) {
      let html = "";

      for (let r = 0; r < PAGE_ROWS; r++) {
        for (let c = 0; c < PAGE_COLS; c++) {
          const cell = page[r][c];
          if (!cell || !cell.start) continue;

          const spot = cell.spot;
          const edgeRight = (c + cell.cols) === PAGE_COLS ? "edge-right" : "";
          const edgeBottom = (r + cell.rows) === PAGE_ROWS ? "edge-bottom" : "";

          html += `
            <div
              class="spot ${edgeRight} ${edgeBottom}"
              data-uid="${spot.uid}"
              style="
                grid-column:${c + 1} / span ${cell.cols};
                grid-row:${r + 1} / span ${cell.rows};
              "
            >
              <div class="spot-head">${escapeHtml(spot.ownerName || "Student")}</div>
              ${buildSpotInner(spot)}
            </div>
          `;
        }
      }

      return html;
    }

    function renderBook() {
      if (!packedPages.length || !publishedSpots.length) {
        bookMeta.textContent = "No published spots yet.";
        bookContainer.innerHTML = `<div class="empty-book">Nothing has been published yet.</div>`;
        return;
      }

      currentPageIndex = Math.max(0, Math.min(currentPageIndex, packedPages.length - 1));
      const page = packedPages[currentPageIndex];

      bookMeta.textContent = `Page ${currentPageIndex + 1} of ${packedPages.length} • ${publishedSpots.length} published spots`;

      bookContainer.innerHTML = `
        <div style="width:100%;">
          <div class="page-wrap">
            <div class="page">
              <div class="page-grid">
                ${renderEmptyCells(page)}
                ${renderSpots(page)}
              </div>
            </div>
          </div>
          <div class="page-num">Yearbook Page ${currentPageIndex + 1}</div>
        </div>
      `;

      const liveSpots = bookContainer.querySelectorAll(".spot");
      liveSpots.forEach((spotEl) => {
        const inner = spotEl.querySelector(".spot-canvas");
        fitInnerToWrapper(spotEl, inner);

        spotEl.addEventListener("click", () => {
          const uid = spotEl.dataset.uid;
          const spot = publishedSpots.find(s => s.uid === uid);
          if (spot) openSpotModal(spot);
        });
      });
    }

    async function loadPublished() {
      try {
        const q = query(
          collection(db, "yearbook"),
          where("kind", "==", "spot"),
          where("published", "==", true)
        );

        const snap = await getDocs(q);

        publishedSpots = snap.docs
          .map(d => d.data())
          .sort((a, b) => {
            const an = (a.ownerName || "").toLowerCase();
            const bn = (b.ownerName || "").toLowerCase();
            return an.localeCompare(bn);
          });

        packedPages = packSpots(publishedSpots);
        renderBook();
      } catch (err) {
        console.error(err);
        bookMeta.textContent = "Could not load the yearbook.";
        bookContainer.innerHTML = `<div class="empty-book">Error loading published pages.</div>`;
      }
    }

    prevBtn.onclick = () => {
      if (!packedPages.length) return;
      currentPageIndex = (currentPageIndex - 1 + packedPages.length) % packedPages.length;
      renderBook();
    };

    nextBtn.onclick = () => {
      if (!packedPages.length) return;
      currentPageIndex = (currentPageIndex + 1) % packedPages.length;
      renderBook();
    };

    function openSpotModal(spot) {
      activeSpot = spot;
      const meta = getTypeMeta(spot.type);

      modalTitle.textContent = spot.ownerName || "Student";
      modalSub.textContent = meta.label;
      spotPreviewFit.innerHTML = buildSpotInner(spot);

      const fit = spotPreviewFit.querySelector(".spot-canvas");
      requestAnimationFrame(() => {
        fitInnerToWrapper(spotPreview, fit);
      });

      signStatus.textContent = "";
      spotModalBg.style.display = "flex";
      resizeSignatureCanvas();
      clearPad();
    }

    closeModalBtn.onclick = () => {
      spotModalBg.style.display = "none";
    };

    cancelSignBtn.onclick = () => {
      clearPad();
      signStatus.textContent = "";
    };

    spotModalBg.addEventListener("click", (e) => {
      if (e.target === spotModalBg) {
        spotModalBg.style.display = "none";
      }
    });

    const ctx = signaturePad.getContext("2d");
    let drawing = false;
    let hasInk = false;

    function resizeSignatureCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const rect = signaturePad.getBoundingClientRect();

      signaturePad.width = rect.width * ratio;
      signaturePad.height = rect.height * ratio;

      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.lineWidth = 2.8;
      ctx.strokeStyle = "#111111";

      if (!hasInk) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, rect.width, rect.height);
      }
    }

    function clearPad() {
      const rect = signaturePad.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, rect.width, rect.height);
      hasInk = false;
    }

    function padPoint(e) {
      const rect = signaturePad.getBoundingClientRect();
      const touch = e.touches?.[0];
      const clientX = touch ? touch.clientX : e.clientX;
      const clientY = touch ? touch.clientY : e.clientY;

      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    function startDraw(e) {
      drawing = true;
      hasInk = true;
      const p = padPoint(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      e.preventDefault();
    }

    function moveDraw(e) {
      if (!drawing) return;
      const p = padPoint(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      e.preventDefault();
    }

    function endDraw() {
      drawing = false;
    }

    signaturePad.addEventListener("mousedown", startDraw);
    signaturePad.addEventListener("mousemove", moveDraw);
    window.addEventListener("mouseup", endDraw);

    signaturePad.addEventListener("touchstart", startDraw, { passive:false });
    signaturePad.addEventListener("touchmove", moveDraw, { passive:false });
    window.addEventListener("touchend", endDraw);

    clearSignatureBtn.onclick = clearPad;

    window.addEventListener("resize", () => {
      renderBook();
      resizeSignatureCanvas();

      if (activeSpot && spotModalBg.style.display === "flex") {
        const fit = spotPreviewFit.querySelector(".spot-canvas");
        if (fit) fitInnerToWrapper(spotPreview, fit);
      }
    });

    async function saveSignature() {
      if (!activeSpot) return;

      if (!hasInk) {
        signStatus.textContent = "Draw a signature first.";
        return;
      }

      saveSignatureBtn.disabled = true;
      signStatus.textContent = "Saving signature...";

      try {
        const spotRef = doc(db, "yearbook", `spot_${activeSpot.uid}`);
        const snap = await getDoc(spotRef);
        if (!snap.exists()) throw new Error("Spot not found.");

        const spot = snap.data();
        const sigs = Array.isArray(spot.signatures) ? [...spot.signatures] : [];
        const signerName = (signerNameInput.value.trim() || currentUser?.displayName || "Anonymous").slice(0, 40);

        const size = getCanvasSize(spot.type || 0);
        const baseW = Math.max(220, size.width * 0.20);
        const baseH = baseW * 0.42;
        const margin = 32;
        const existingCount = sigs.length;
        const perRow = Math.max(1, Math.floor((size.width - margin * 2) / (baseW + 18)));

        const x = margin + (existingCount % perRow) * (baseW + 18);
        const y = size.height - baseH - margin - Math.floor(existingCount / perRow) * (baseH + 14);

        sigs.push({
          signerUid: currentUser?.uid || null,
          signerName,
          dataUrl: signaturePad.toDataURL("image/png"),
          x: Math.max(margin, Math.min(x, size.width - baseW - margin)),
          y: Math.max(margin, Math.min(y, size.height - baseH - margin)),
          w: baseW,
          h: baseH,
          rotation: (existingCount % 5 - 2) * 2.2,
          createdAtMs: Date.now()
        });

        await updateDoc(spotRef, {
          signatures: sigs,
          updatedAt: serverTimestamp()
        });

        activeSpot.signatures = sigs;
        openSpotModal(activeSpot);
        signStatus.textContent = "Signature saved.";
      } catch (err) {
        console.error(err);
        signStatus.textContent = err.message || "Could not save signature.";
      } finally {
        saveSignatureBtn.disabled = false;
      }
    }

    saveSignatureBtn.onclick = saveSignature;
    loadPublished();
  </script>
</body>
</html>
